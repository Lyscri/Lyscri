name: Refresh Stats Cache

on:
  schedule:
    # Se ejecuta cada hora (al minuto 0)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Update Cache Buster
        run: |
          # Esto busca una etiqueta especial en tu README y le añade la fecha actual
          sed -i "s/&cache_id=[0-9]*//g" README.md
          sed -i "s/user=Lyscri/user=Lyscri\&cache_id=$(date +%s)/g" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh stats cache" || exit 0
          git push
